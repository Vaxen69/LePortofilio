<style>
  html { margin: 0; padding: 0; background: #f5f6f8; scroll-behavior: smooth; overflow-x: hidden; }
  body { margin: 0; padding: 0; background: transparent; scroll-behavior: smooth; overflow-x: hidden; }
  * { box-sizing: border-box; }

  /* Top scroll progress bar */
  .scroll-progress {
    position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 10000;
    background: transparent;
  }
  .scroll-progress > div {
    height: 100%; background: linear-gradient(90deg, #4F46E5, #818cf8);
    transform-origin: 0 0; will-change: transform;
  }

  /* Music section animations */
  @keyframes vinyl-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes eq-bar {
    0%   { height: 6px; }
    100% { height: 32px; }
  }
  /* Interest card animations */
  @keyframes ball-bounce {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-12px) rotate(20deg); }
  }
  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 0.12; }
    50%      { transform: scale(1.08); opacity: 0.2; }
  }
  @keyframes film-pan {
    0%   { transform: translateX(0); }
    100% { transform: translateX(40px); }
  }

  /* Section underline draws in with the heading */
  .section-underline { animation: draw-underline 1100ms cubic-bezier(0.22, 1, 0.36, 1) both; animation-delay: 250ms; }
  @keyframes draw-underline {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  /* Hover micro-animations — global */
  .interest-card { cursor: default; }
  .interest-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 22px 50px rgba(15,23,42,0.18);
  }
  .skill-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(15,23,42,0.08);
  }
  .skill-row { transition: padding-left 0.25s ease; }
  .skill-row:hover { padding-left: 6px !important; }

  /* Carrousel : l'image entre en glissant dans le sens de la navigation */
  @keyframes carousel-next {
    from { opacity: 0; transform: translateX(36px) scale(0.99); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes carousel-prev {
    from { opacity: 0; transform: translateX(-36px) scale(0.99); }
    to   { opacity: 1; transform: none; }
  }
  .carousel-in-next { animation: carousel-next 0.35s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .carousel-in-prev { animation: carousel-prev 0.35s cubic-bezier(0.22, 1, 0.36, 1) both; }

  /* Fiche projet : entrée en fondu + cartes précédent/suivant */
  @keyframes detail-in {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: none; }
  }
  .detail-in { animation: detail-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .detail-nav { transition: transform 0.25s, box-shadow 0.25s; }
  .detail-nav:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(15,23,42,0.10); }

  /* Logos des cartes Parcours : petite oscillation au survol */
  @keyframes logo-wiggle {
    0%   { transform: scale(1) rotate(0deg); }
    30%  { transform: scale(1.14) rotate(-7deg); }
    60%  { transform: scale(1.08) rotate(6deg); }
    100% { transform: scale(1.1) rotate(0deg); }
  }
  .org-logo img { transition: transform 0.3s ease; }
  .org-logo:hover img,
  .org-fallback:hover { animation: logo-wiggle 0.45s ease both; }
  .org-logo { transition: box-shadow 0.25s; }
  .org-logo:hover { box-shadow: 0 10px 26px rgba(79,70,229,0.18); }

  /* Chips projet des cartes Parcours : inversion au survol */
  .project-chip:hover {
    background: #4F46E5 !important;
    color: #fff !important;
    border-color: #4F46E5 !important;
  }

  /* Tuiles de compétences : lift au survol + logo qui s'anime */
  .skill-tile { transition: transform 0.25s ease; cursor: default; }
  .skill-tile:hover { transform: translateY(-4px); }
  .skill-tile img, .skill-tile .skill-fallback { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .skill-tile:hover img, .skill-tile:hover .skill-fallback { transform: scale(1.14) rotate(-4deg); }

  .music-pill:hover {
    background: rgba(196,181,253,0.3) !important;
    transform: translateY(-1px);
  }

  /* Project card lift + image zoom on hover */
  .project-card { transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s; }
  .project-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 22px 50px rgba(15,23,42,0.14);
  }
  .project-card img { transition: transform 0.6s cubic-bezier(0.22,1,0.36,1); }
  .project-card:hover img { transform: scale(1.04); }

  /* Work card hover — subtle lift + accent left edge */
  .work-card {
    transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s;
  }
  .work-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 40px rgba(15,23,42,0.08), inset 3px 0 0 #4F46E5;
  }

  /* Hero CTAs */
  a[data-cta] { transition: transform 0.2s, box-shadow 0.2s; }
  a[data-cta]:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(79,70,229,0.25); }


  /* Nav links underline animation */
  nav a {
    position: relative;
    transition: color 0.2s;
  }
  nav a::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -4px;
    height: 1.5px; background: #4F46E5; transform: scaleX(0); transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
  }
  nav a:hover { color: #4F46E5 !important; }
  nav a:hover::after { transform: scaleX(1); }

  /* Subtle hover lift baseline (scoped via JSX inline still applies) */
  a, button { font-family: inherit; }

  /* Accessibilité : neutralise animations et transitions si l'utilisateur le demande */
  @media (prefers-reduced-motion: reduce) {
    html, body { scroll-behavior: auto; }
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
